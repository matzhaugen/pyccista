notifications:
  email: false

services:
  - docker
jobs:
  include:
    - env: 
      DOCKER_IMAGE=quay.io/pypa/manylinux2014_x86_64 PLAT=manylinux2014_x86_64
      TAG=1 REPOSITORY_URL=https://test.pypi.org/legacy/ TWINE_USERNAME=__token__
      TWINE_PASSWORD=$TWINE_TOKEN_TEST
    - env: 
      DOCKER_IMAGE=quay.io/pypa/manylinux2010_x86_64 PLAT=manylinux2010_x86_64
      TAG=1 REPOSITORY_URL=https://test.pypi.org/legacy/ TWINE_USERNAME=__token__
      TWINE_PASSWORD=$TWINE_TOKEN_TEST

install:
- ./scripts/build_dependencies.sh matzhaugen/concord-builder $TAG
script:
- docker build -t matzhaugen/concord:$TAG -f Dockerfile_concord .
- docker build -t matzhaugen/twine -f Dockerfile_twine  . >/dev/null 2>&1
- docker run -e TWINE_USERNAME=$TWINE_USERNAME -e TWINE_PASSWORD=$TWINE_PASSWORD -e REPOSITORY_URL=$REPOSITORY_URL
  matzhaugen/twine scripts/upload_package.sh
env:
  global:
  - secure: 
  - secure: 
