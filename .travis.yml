notifications:
  email: false

jobs:
  include:
    - os: osx
      language: generic
      env: PYTHON=36
    - env: DOCKER_IMAGE=quay.io/pypa/manylinux2010_x86_64 PLAT=manylinux2010_x86_64 TAG=1 
      services: docker
    - env: DOCKER_IMAGE=quay.io/pypa/manylinux2014_x86_64 PLAT=manylinux2014_x86_64 TAG=1
      services: docker

env: 
  global:
    - REPOSITORY_URL=https://test.pypi.org/legacy/ TWINE_USERNAME=__token__ TWINE_PASSWORD=$TWINE_TOKEN_TEST
    - secure: 
    - secure: 

# For OS X
before_install:

  - if [[ "$TRAVIS_OS_NAME" == "osx" ]]; then
    brew install swig;
    curl -LO https://raw.githubusercontent.com/GiovanniBussi/macports-ci/master/macports-ci;
    source ./macports-ci install;
    fi

  - if [[ "$TRAVIS_OS_NAME" == "osx" ]]; then
    yes | sudo port install python$PYTHON;
    yes | sudo port install py$PYTHON-pip;
    sudo port select --set python3 python$PYTHON;
    sudo port select --set pip pip$PYTHON;
    pip install pyinstaller --user;
    export PATH=$PATH:/Users/travis/Library/Python/$PYTHON/bin;
    fi

  - if [[ "$TRAVIS_OS_NAME" == "osx" ]]; then
    python3 --version;
    pip --version;
    fi

install:
- ./scripts/build_dependencies.sh matzhaugen/concord-builder $TAG
script:
- ./scripts/build_and_push.sh
  
